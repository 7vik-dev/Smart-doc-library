# ===========================================
# Smart Document Library - Application Config
# ===========================================

# Server
server.port=${PORT:8080}

# PostgreSQL Connection
# Render provides DATABASE_URL which starts with postgresql://
# We prefix it with 'jdbc:' for the Spring driver.
spring.datasource.url=jdbc:${DATABASE_URL:postgresql://localhost:5432/smart_doc_library}
# These are often part of the URL, but keeping them for local fallback
spring.datasource.username=${JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===========================================
# CACHING CONFIGURATION
# Spring Cache uses simple in-memory cache by default (ConcurrentHashMap)
# This means: first request hits MongoDB, second request returns from RAM
# ===========================================
spring.cache.type=simple

# ===========================================
# ACTUATOR - Monitoring Endpoints
# These endpoints let us observe the health and metrics of the application
#
# /actuator/health    → Is the app up? Is MongoDB connected?
# /actuator/metrics   → JVM memory, HTTP request counts, cache hit ratios
# /actuator/loggers   → View/change log levels at runtime (no restart needed!)
# /actuator/info      → App version and custom info
# ===========================================
management.endpoints.web.exposure.include=health,metrics,loggers,info,caches,env
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Custom app info (visible at /actuator/info)
info.app.name=Smart Document Library
info.app.description=Performance Monitoring Demo
info.app.version=1.0.0
info.app.author=Teaching Demo

# ===========================================
# ASYNC THREAD POOL CONFIGURATION
# Spring will use these settings for @Async methods
# Core pool = threads always running
# Max pool = threads created under high load
# Queue capacity = tasks waiting when all threads are busy
# ===========================================
async.core-pool-size=2
async.max-pool-size=5
async.queue-capacity=100

# ===========================================
# LOGGING - Structured log levels
# TRACE < DEBUG < INFO < WARN < ERROR
# For teaching: INFO shows useful events, DEBUG shows everything
# ===========================================
logging.level.com.example.doclib=DEBUG
logging.level.org.springframework.cache=TRACE
logging.level.root=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Allow large file uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
