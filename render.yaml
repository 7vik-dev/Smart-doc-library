services:
  - type: web
    name: smart-doc-library
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: 10000
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: smart-doc-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: smart-doc-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: smart-doc-db
          property: password

databases:
  - name: smart-doc-db
    databaseName: smart_doc_library
    user: smart_doc_user
    plan: free
    region: oregon
